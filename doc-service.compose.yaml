services:

  minio:
    image: minio/minio:latest
    ports:
      - 9000:9000
    volumes:
      - minio_data:/data
    networks:
      - doc-service-network
    environment:
      - MINIO_ACCESS_KEY=drm-document-service
      - MINIO_SECRET_KEY=drm-document-service-secret-key

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
    volumes:
      - qdrant_data:/qdrant/data
    networks:
      - doc-service-network

