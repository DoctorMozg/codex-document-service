services:

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    networks:
      - doc-service-network
    environment:
      - MINIO_ROOT_USER=drm-document-service
      - MINIO_ROOT_PASSWORD=drm-document-service-secret-key

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - doc-service-network

  doc-service-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    environment:
    - OPEN_AI_KEY=${OPEN_AI_KEY}
    - MINIO_HOST=minio
    - MINIO_PORT=9000
    - MINIO_ACCESS_KEY=drm-document-service
    - MINIO_SECRET_KEY=drm-document-service-secret-key
    - QDRANT_HOST=qdrant
    - QDRANT_PORT=6334
    - SERVICE_PORT=8000
    - SERVICE_HOST=0.0.0.0
    - SERVICE_DEBUG=true
    - LOG_LEVEL=DEBUG
    working_dir: /app
    networks:
      - doc-service-network

networks:
  doc-service-network:
    driver: bridge

volumes:
  minio_data:
  qdrant_data:
